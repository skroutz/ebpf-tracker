name: Build and Publish eBPF Tracker

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Serialise releases so concurrent tag pushes don't race on `oras tag latest`.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: compile the Go binary, run tests, push OCI artifact to ghcr.io,
  #         and build the Node.js dist. Needs packages:write but NOT
  #         contents:write — this job never touches the git tree.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # required for keyless cosign signing via OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      # -----------------------------------------------------------------------
      # System dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libelf-dev libbpf-dev \
            "linux-headers-$(uname -r)"
          # /usr/bin/bpftool is a wrapper that resolves the real binary via
          # `uname -r` literally. On Azure runners uname -r omits the flavour
          # suffix (e.g. 6.17.0-1013 vs 6.17.0-1013-azure), so the wrapper
          # always fails. Instead: find the real binary under
          # /usr/lib/linux-tools, install linux-tools-generic if it's absent,
          # then symlink into /usr/local/bin to bypass the wrapper.
          BPFTOOL_BIN=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          if [ -z "$BPFTOOL_BIN" ]; then
            sudo apt-get install -y --no-install-recommends linux-tools-generic
            BPFTOOL_BIN=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          fi
          if [ -z "$BPFTOOL_BIN" ]; then
            echo "ERROR: bpftool binary not found" >&2; exit 1
          fi
          sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          echo "bpftool → $BPFTOOL_BIN"
          bpftool version

      - name: Set up Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: tracker/go.sum

      # -----------------------------------------------------------------------
      # Generate vmlinux.h from the running kernel's BTF
      # -----------------------------------------------------------------------
      - name: Generate vmlinux.h
        run: |
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > tracker/bpf/vmlinux.h

      # -----------------------------------------------------------------------
      # Compile C → BPF object, then bpf2go → Go skeleton
      # -----------------------------------------------------------------------
      - name: Generate BPF Go bindings
        working-directory: tracker
        run: go generate ./cmd/...

      # -----------------------------------------------------------------------
      # Run unit tests before building the artifact — gate the release on
      # green tests even if ci.yml was not run on this exact commit.
      # -----------------------------------------------------------------------
      - name: Run unit tests
        working-directory: tracker
        run: go test ./internal/...

      # -----------------------------------------------------------------------
      # Build fully static Go binary (CGO_ENABLED=0)
      # -----------------------------------------------------------------------
      - name: Build static Go binary
        working-directory: tracker
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o ebpf-tracker ./cmd/

      # -----------------------------------------------------------------------
      # Install ORAS CLI
      # -----------------------------------------------------------------------
      - name: Install ORAS
        uses: oras-project/setup-oras@f0d18da5c37edac93d2353d47004a527b9d153a2 # v2

      # -----------------------------------------------------------------------
      # Install cosign for keyless artifact signing (Sigstore)
      # -----------------------------------------------------------------------
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # -----------------------------------------------------------------------
      # Log in to ghcr.io and push the binary as an OCI artifact.
      # Only runs on real tag pushes; workflow_dispatch runs tests only.
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push binary to ghcr.io
        if: startsWith(github.ref, 'refs/tags/v')
        id: push
        working-directory: tracker
        run: |
          TAG="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          DIGEST=$(oras push \
            ghcr.io/${{ github.repository_owner }}/ebpf-tracker:${TAG} \
            ebpf-tracker:application/octet-stream \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.revision=${SHA}" \
            --format json | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          # Tag with the full commit SHA so consumers can pin by SHA:
          #   uses: skroutz/ebpf-tracker@<sha> # v1.0.0
          oras tag \
            ghcr.io/${{ github.repository_owner }}/ebpf-tracker:${TAG} \
            ${SHA}
          # Also advance :latest so existing users who pin @latest stay current
          oras tag \
            ghcr.io/${{ github.repository_owner }}/ebpf-tracker:${TAG} \
            latest

      # -----------------------------------------------------------------------
      # Sign the artifact with cosign keyless (Sigstore OIDC).
      # The signature is stored in the same ghcr.io repo alongside the artifact
      # and ties the digest back to this exact workflow run.
      # Consumers can verify with:
      #   cosign verify ghcr.io/skroutz/ebpf-tracker:<tag> \
      #     --certificate-identity-regexp=https://github.com/skroutz/ebpf-tracker \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      # -----------------------------------------------------------------------
      - name: Sign OCI artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/ebpf-tracker@${{ steps.push.outputs.digest }}"

      # -----------------------------------------------------------------------
      # Verify the Node.js action dist is up-to-date (the checked-in dist/
      # must always match what `npm run build` produces; see check-dist.yml)
      # -----------------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build action dist
        run: npm run build
