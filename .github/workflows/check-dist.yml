# dist/ contains the compiled Node.js action entrypoints. The checked-in files
# must always match what `npm run build` produces. This workflow fails fast if
# a contributor forgets to rebuild before pushing, catching the drift on PRs
# before it can land on main.

name: Check dist/

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dist:
    name: Check dist/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v6.4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist/
        run: npm run build

      - name: Compare expected and actual dist/
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See diff below:"
            git diff --ignore-space-at-eol --text dist/
            exit 1
          fi

      # Upload the correctly-built dist/ so the author can download and commit
      # it without having to run the build locally.
      - name: Upload expected dist/
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/
